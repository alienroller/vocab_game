# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.

include: package:flutter_lints/flutter.yaml

analyzer:
  # NOTE: strict-casts intentionally left at its default (false). Turning it on
  # promotes implicit `dynamic → T` casts — which occur naturally in untyped
  # Supabase/Hive reads throughout this pre-existing codebase — into hard
  # errors. Fixing every call site is a separate cleanup pass. The stricter
  # raw-types + inference checks below surface as *warnings*, which is what
  # we want: visibility without breaking the build.
  language:
    strict-inference: true
    strict-raw-types: true
  errors:
    # Promote common correctness issues to errors
    missing_required_param: error
    missing_return: error
    invalid_use_of_protected_member: error
    unused_import: warning
    unused_local_variable: warning
    unused_element: warning
    dead_code: warning
    # Keep these as warnings — many legacy call sites hit them. Revisit once
    # the refactor to type Hive boxes (A3/A6 in the audit) lands.
    argument_type_not_assignable: warning
    invalid_assignment: warning
    non_bool_operand: warning
    inference_failure_on_function_invocation: warning
    inference_failure_on_untyped_parameter: warning
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"

linter:
  rules:
    # Correctness
    always_declare_return_types: true
    avoid_empty_else: true
    avoid_returning_null_for_future: true
    avoid_types_as_parameter_names: true
    cancel_subscriptions: true
    close_sinks: true
    empty_catches: true         # Disallow empty catch blocks
    hash_and_equals: true
    no_duplicate_case_values: true
    prefer_void_to_null: true
    unrelated_type_equality_checks: true
    valid_regexps: true

    # Style / readability
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_fields: true
    prefer_final_locals: true
    prefer_is_empty: true
    prefer_is_not_empty: true
    prefer_single_quotes: true
    prefer_typing_uninitialized_variables: true
    sort_child_properties_last: true
    unnecessary_brace_in_string_interps: true
    unnecessary_const: true
    unnecessary_new: true
    unnecessary_this: true

    # Async safety
    unawaited_futures: true     # Catches fire-and-forget futures

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
