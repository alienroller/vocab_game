name: vocab_game
description: "VocabGame Builder – English ↔ Uzbek vocabulary learning app"
publish_to: 'none'
version: 1.0.5+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  go_router: ^14.6.3

  # --- Competitive upgrade additions ---
  supabase_flutter: ^2.8.4
  flutter_local_notifications: ^18.0.1
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  timezone: ^0.10.0
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  crypto: ^3.0.6
  share_plus: ^10.1.4
  http: ^1.6.0
  path: ^1.9.1
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0

  # --- Speaking module additions ---
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  permission_handler: ^11.3.0

  # --- Security (Hive encryption key, PIN hashing) ---
  flutter_secure_storage: ^9.2.2

  # --- Offline speech engine (Sherpa-ONNX Zipformer STT) ---
  # Native plugin bundles per-platform libraries automatically.
  # Models are downloaded on first opt-in (see OfflineModelManager).
  sherpa_onnx: ^1.12.39
  archive: ^3.6.1
  record: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/top5000_bundle.json
