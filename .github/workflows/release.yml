name: Release Build

on:
  pull_request:
    branches:
      - release

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}

jobs:
  # ─────────────────────────────────────────────
  # Android AAB
  # ─────────────────────────────────────────────
  build_android:
    name: Build Android AAB
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"              > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}"       >> android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}"   >> android/key.properties
          echo "storeFile=keystore.jks"                        >> android/key.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Run Build Runner
        run: |
          dart run build_runner build --delete-conflicting-outputs
          echo "Build Runner finished"

      - name: Build Android AAB
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename AAB
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/vocab_game-${VERSION}.aab

      - name: Upload AAB to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: v${{ steps.version.outputs.name }}
          files: build/app/outputs/bundle/release/vocab_game-${{ steps.version.outputs.name }}.aab
          generate_release_notes: true

      - name: Notify Telegram
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          COMMENT=$(git log -1 --pretty=%B)
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="🤖 <b>Android AAB ${VERSION} is ready!</b>
  
          ${COMMENT}
  
          🔗 <a href='${RELEASE_URL}'>Download from GitHub Releases</a>"

# ─────────────────────────────────────────────
# iOS IPA
# ─────────────────────────────────────────────
  build_ios:
    name: Build iOS IPA
    runs-on: macos-26
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.3'
        cache: true

    - name: Cache pub dependencies
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Install dependencies
      run: flutter pub get

    - name: Run Build Runner
      run: |
        dart run build_runner build --delete-conflicting-outputs
        echo "Build Runner finished"

    - name: Import signing certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        CERT_PATH=$RUNNER_TEMP/certificate.p12
        echo "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
        security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" \
          -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: \
          -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

    - name: Install provisioning profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      run: |
        PP_PATH=$RUNNER_TEMP/profile.mobileprovision
        echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
        PP_UUID=$(security cms -D -i "$PP_PATH" \
          | plutil -extract UUID raw -)
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"${PP_UUID}.mobileprovision"

    - name: Build iOS (no codesign)
      run: |
        flutter build ios --release --no-codesign \
          --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
          --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

    - name: Fix App.framework MinimumOSVersion
      run: |
        PLIST="build/ios/Release-iphoneos/Runner.app/Frameworks/App.framework/Info.plist"
        if [ -f "$PLIST" ]; then
          /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 13.0" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 13.0" "$PLIST"
          echo "Patched MinimumOSVersion in App.framework"
        else
          echo "WARNING: App.framework Info.plist not found at expected path"
          find build/ios -name "Info.plist" | grep App.framework
        fi

    - name: Archive and export IPA
      env:
        EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
      run: |
        set -o pipefail
        EXPORT_OPTIONS_PATH=$RUNNER_TEMP/ExportOptions.plist
        echo "$EXPORT_OPTIONS_PLIST_BASE64" | base64 --decode -o "$EXPORT_OPTIONS_PATH"
        ARCHIVE_PATH=$RUNNER_TEMP/VocabGame.xcarchive
        IPA_DIR=$RUNNER_TEMP/ipa
        
        echo "Archiving..."
        xcodebuild archive \
          -workspace ios/Runner.xcworkspace \
          -scheme Runner \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath "$ARCHIVE_PATH" \
          IPHONEOS_DEPLOYMENT_TARGET=13.0
        
        echo "Exporting IPA..."
        xcodebuild -exportArchive \
          -archivePath "$ARCHIVE_PATH" \
          -exportPath "$IPA_DIR" \
          -exportOptionsPlist "$EXPORT_OPTIONS_PATH"
        
        echo "IPA_DIR=$IPA_DIR" >> $GITHUB_ENV

    - name: Get version from pubspec
      id: version
      run: |
        VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
        echo "name=$VERSION" >> $GITHUB_OUTPUT

    - name: Rename IPA
      run: |
        VERSION="${{ steps.version.outputs.name }}"
        IPA_SRC=$(find "$IPA_DIR" -name "*.ipa" | head -1)
        mv "$IPA_SRC" "$RUNNER_TEMP/vocab_game-${VERSION}.ipa"
        echo "IPA_PATH=$RUNNER_TEMP/vocab_game-${VERSION}.ipa" >> $GITHUB_ENV

    - name: Upload IPA to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.name }}
        name: v${{ steps.version.outputs.name }}
        files: ${{ env.IPA_PATH }}
        generate_release_notes: true

    - name: Notify Telegram
      run: |
        VERSION="${{ steps.version.outputs.name }}"
        COMMENT=$(git log -1 --pretty=%B)
        RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
        curl -s -X POST \
          "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d parse_mode="HTML" \
          -d text="🍎 <b>iOS IPA ${VERSION} is ready!</b>
  
        ${COMMENT}
  
        🔗 <a href='${RELEASE_URL}'>Download from GitHub Releases</a>"

    - name: Clean up keychain
      if: always()
      run: |
        security delete-keychain $RUNNER_TEMP/build.keychain || true