name: Build Flutter App
on:
  push:
    branches:
      - main
      - v1.*.*

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}

jobs:
  build_android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          cache: true
      
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Create key.properties
        run: |
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties
      
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
      
      - name: Flutter Build Runner
        run: |
          dart run build_runner build --delete-conflicting-outputs
          echo "Flutter Build Running finished"
      
      - name: Build Android APK
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
      
      - name: Get version from pubspec
        id: version
        run: |
          # pubspec.yaml dan version olish (masalan: 1.0.0+1)
          FULL_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          # Faqat version raqami (masalan: 1.0.0)
          VERSION=$(echo $FULL_VERSION | sed 's/+.*//')
          # Build number (masalan: 1)
          BUILD_NUMBER=$(echo $FULL_VERSION | sed 's/.*+//')
          
          echo "full=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
      
      - name: Prepare APK
        id: apk_info
        run: |
          APK_SRC="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          APK_DST="build/app/outputs/flutter-apk/vocab_game-v${{ steps.version.outputs.version }}.apk"
          mv "$APK_SRC" "$APK_DST"
          
          # Clean commit message
          COMMIT=$(git log -1 --pretty=%B | head -n 1 | sed 's/[^a-zA-Z0-9 .,!?-]//g')
          
          echo "apk_path=${APK_DST}" >> "$GITHUB_OUTPUT"
          echo "commit_message=${COMMIT}" >> "$GITHUB_OUTPUT"
      
      # Firebase Distribution
      - name: Setup Firebase CLI
        run: |
          curl -sL https://firebase.tools | bash
      
      - name: Upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-key.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > firebase-key.json
          
          firebase appdistribution:distribute "${{ steps.apk_info.outputs.apk_path }}" \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --release-notes "Version: ${{ steps.version.outputs.version }} (Build ${{ steps.version.outputs.build_number }})
          
          ${{ steps.apk_info.outputs.commit_message }}" \
            --groups "testers"
          
          rm -f firebase-key.json
      
      # Telegram Notification
      - name: Send Success Message to Telegram
        if: success()
        run: |
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
               -d "chat_id=${CHAT_ID}" \
               -d "parse_mode=Markdown" \
               -d "text=✅ *Build Muvaffaqiyatli!*%0A%0A📦 Versiya: \`${{ steps.version.outputs.version }}\` (Build ${{ steps.version.outputs.build_number }})%0A🔥 Firebase Distribution: Yuklandi%0A%0A📝 Commit: ${{ steps.apk_info.outputs.commit_message }}%0A%0A🔗 Testerlar Firebase App Distribution orqali yuklab olishlari mumkin"
      
      - name: Send Failure Message to Telegram
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
               -d "chat_id=${CHAT_ID}" \
               -d "parse_mode=Markdown" \
               -d "text=❌ *Build Xato!*%0A%0ABranch: \`${{ github.ref_name }}\`%0ACommit: \`${{ github.sha }}\`%0A%0AGitHub Actions'da tafsilotlarni ko'ring."
