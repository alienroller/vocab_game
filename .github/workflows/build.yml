name: Build Flutter App
on:
  push:
    branches:
      - main
      - v1.*.*

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}

jobs:
  build_android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          cache: true
      
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Create key.properties
        run: |
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties
      
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
      
      - name: Flutter Build Runner
        run: |
          dart run build_runner build --delete-conflicting-outputs
          echo "Flutter Build Running finished"
      
      - name: Build Android APK
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
      
      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          echo "name=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Set version name and rename APK
        id: apk_info
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          COMMENT=$(git log -1 --pretty=%B)
          APK_SRC="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          APK_DST="build/app/outputs/flutter-apk/vocab_game-${VERSION}.apk"
          mv "$APK_SRC" "$APK_DST"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "apk_path=$APK_DST" >> $GITHUB_OUTPUT
          echo "commit_message=$COMMENT" >> $GITHUB_OUTPUT
      
      # Firebase Distribution
      - name: Setup Firebase CLI
        run: |
          curl -sL https://firebase.tools | bash
      
      - name: Authenticate Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > $HOME/firebase-service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-service-account.json
      
      - name: Upload to Firebase App Distribution
        run: |
          VERSION="${{ steps.apk_info.outputs.version }}"
          COMMENT="${{ steps.apk_info.outputs.commit_message }}"
          APK_PATH="${{ steps.apk_info.outputs.apk_path }}"
          
          firebase appdistribution:distribute "$APK_PATH" \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --release-notes "Version: $VERSION
          
          $COMMENT" \
            --groups "testers"
      
      # Telegram Notification
      - name: Send Success Message to Telegram
        if: success()
        run: |
          VERSION="${{ steps.apk_info.outputs.version }}"
          COMMENT="${{ steps.apk_info.outputs.commit_message }}"
          
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
               -d "chat_id=${CHAT_ID}" \
               -d "parse_mode=Markdown" \
               -d "text=✅ *Build Successful!*
          
          📦 Version: \`$VERSION\`
          🔥 Firebase Distribution: Uploaded
          
          📝 Commit: $COMMENT
          
          🔗 Download from Firebase App Distribution"
      
      - name: Send Failure Message to Telegram
        if: failure()
        run: |
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
               -d "chat_id=${CHAT_ID}" \
               -d "parse_mode=Markdown" \
               -d "text=❌ *Build Failed!*
          
          Branch: \`${{ github.ref_name }}\`
          Commit: ${{ github.sha }}
          
          Check GitHub Actions for details."
