name: Android Release Build

on:
  pull_request:
    branches:
      - release

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}

jobs:
  build_android:
    name: Build Android AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"              > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}"       >> android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}"   >> android/key.properties
          echo "storeFile=keystore.jks"                        >> android/key.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Run Build Runner
        run: |
          dart run build_runner build --delete-conflicting-outputs
          echo "Build Runner finished"

      - name: Build Android AAB
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename AAB
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/vocab_game-${VERSION}.aab

      - name: Upload AAB to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: v${{ steps.version.outputs.name }}
          files: build/app/outputs/bundle/release/vocab_game-${{ steps.version.outputs.name }}.aab
          generate_release_notes: true

      - name: Notify Telegram
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          COMMENT=$(git log -1 --pretty=%B)
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="🤖 <b>Android AAB ${VERSION} is ready!</b>

            ${COMMENT}
  
            🔗 <a href='${RELEASE_URL}'>Download from GitHub Releases</a>"